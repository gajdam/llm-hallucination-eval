# FEVER dataset settings
fever:
  split: "labelled_dev"        # train | labelled_dev | paper_dev | paper_test
  max_samples: 200              # null = use all samples
  labels: ["SUPPORTS", "REFUTES"]
  seed: 42

# LLMs to evaluate — comment out any you don't have API keys for
llms:
  - name: "claude-opus-4-6"
    provider: "anthropic"
  - name: "claude-sonnet-4-6"
    provider: "anthropic"
  - name: "claude-haiku-4-5"
    provider: "anthropic"
  - name: "gpt-4o"
    provider: "openai"
  - name: "gpt-4o-mini"
    provider: "openai"
  - name: "llama3.2"
    provider: "ollama"
    base_url: "http://localhost:11434"

# NLI model for comparing LLM responses against claims
nli:
  # Options (tradeoff between speed and quality):
  #   cross-encoder/nli-deberta-v3-large   ~1.5GB, best quality
  #   cross-encoder/nli-MiniLM2-L6-H768   ~67MB, fast
  #   facebook/bart-large-mnli            ~1.6GB, strong alternative
  model: "cross-encoder/nli-deberta-v3-large"
  batch_size: 16
  device: "auto"     # auto | cpu | cuda | mps
  max_length: 512    # max tokens for premise+hypothesis

# Prompts sent to each LLM
prompts:
  system: >
    You are a fact-checking assistant. Your task is to verify whether
    statements are true or false based on your knowledge.
  user_template: >
    Is the following statement TRUE or FALSE?
    Start your response with "TRUE:" or "FALSE:", then give a one-sentence explanation.

    Statement: {claim}

# Claim quality filters — applied before max_samples cap
# Set enabled: false to turn off all filtering at once
filtering:
  enabled: true
  min_words: 8                    # drop claims shorter than N words
  filter_vague_predicates: true   # drop "[X] is/are a [word]." patterns

# Evaluation settings
evaluation:
  output_dir: "results"
  save_responses: true   # save raw LLM responses to disk
  request_delay: 0.5     # seconds between API calls (avoid rate limits)
